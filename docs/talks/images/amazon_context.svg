  <text x="70" y="80" font-size="36" font-weight="800" fill="#103f2f">Amazônia: eventos climáticos atravessam o cotidiano</text>
  <text x="70" y="130" font-size="25" fill="#1f2d28">Seca, fumaça, calor e cheias mudam circulação, água, alimento, trabalho, escola e acesso aos serviços.</text>
